<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" aria-hidden="true">
  <!-- ioclean lotus — eight translucent petals fanning around a central point.
       Colors pulled from the brand palette (violet/lavender/mid-blue/teal/cyan).
       Stacking alpha creates the darker overlap regions characteristic of the
       brand mark. -->
  <g transform="translate(50 52)">
    <!-- Each petal: a teardrop path pointing up, then rotated around (0,0). -->
    <g fill-opacity="0.78">
      <path d="M 0 0 Q -10 -22 0 -42 Q 10 -22 0 0 Z" fill="#7DD6FB" transform="rotate(0)"/>
      <path d="M 0 0 Q -10 -22 0 -42 Q 10 -22 0 0 Z" fill="#9B8BF4" transform="rotate(-45)"/>
      <path d="M 0 0 Q -10 -22 0 -42 Q 10 -22 0 0 Z" fill="#5B78E6" transform="rotate(45)"/>
      <path d="M 0 0 Q -10 -22 0 -42 Q 10 -22 0 0 Z" fill="#7063F3" transform="rotate(-80)"/>
      <path d="M 0 0 Q -10 -22 0 -42 Q 10 -22 0 0 Z" fill="#5BBDD4" transform="rotate(80)"/>
      <path d="M 0 0 Q -10 -22 0 -42 Q 10 -22 0 0 Z" fill="#6D28D9" transform="rotate(-118)"/>
      <path d="M 0 0 Q -10 -22 0 -42 Q 10 -22 0 0 Z" fill="#7DD6FB" transform="rotate(118)"/>
      <path d="M 0 0 Q -10 -22 0 -42 Q 10 -22 0 0 Z" fill="#4338CA" transform="rotate(180)"/>
    </g>
  </g>
</svg>
