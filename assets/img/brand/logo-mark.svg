<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" aria-hidden="true">
  <!-- Outer ripple ring (faintest) -->
  <circle cx="16" cy="16" r="13" stroke="currentColor" stroke-width="0.8" opacity="0.32"/>
  <!-- Middle ripple ring -->
  <circle cx="16" cy="16" r="9.5" stroke="currentColor" stroke-width="0.9" opacity="0.55"/>
  <!-- Central drop -->
  <circle cx="16" cy="16" r="5.5" fill="currentColor"/>
  <!-- Specular highlight -->
  <circle cx="14.4" cy="14.4" r="1.5" fill="rgba(255,255,255,0.45)"/>
</svg>
