<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#04030c"/>
      <stop offset="100%" stop-color="#100d2e"/>
    </linearGradient>
    <radialGradient id="blobA" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#7063F3" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#7063F3" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blobB" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#7DD6FB" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7DD6FB" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#ffffff"/>
      <stop offset="55%" stop-color="#c4bef9"/>
      <stop offset="100%" stop-color="#7DD6FB"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="220" cy="120" rx="500" ry="320" fill="url(#blobA)"/>
  <ellipse cx="1000" cy="540" rx="520" ry="320" fill="url(#blobB)"/>

  <!-- Wordmark + tagline -->
  <g transform="translate(112, 282)">
    <text x="0" y="0"
          fill="url(#textGrad)"
          font-family="'Space Grotesk', 'Inter', system-ui, sans-serif"
          font-weight="600"
          font-size="140"
          letter-spacing="-4">ioclean<tspan fill="#9b8bf4">.</tspan></text>
    <text x="6" y="70"
          fill="#a39db8"
          font-family="'Inter', system-ui, sans-serif"
          font-weight="400"
          font-size="34"
          letter-spacing="-0.5">Melbourne's commercial &amp; industrial cleaning crew</text>
  </g>

  <text x="1136" y="588"
        text-anchor="end"
        fill="rgba(196, 190, 249, 0.7)"
        font-family="'JetBrains Mono', ui-monospace, monospace"
        font-size="20"
        letter-spacing="2">ioclean.com.au</text>
</svg>
