<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#04030c"/>
      <stop offset="100%" stop-color="#100d2e"/>
    </linearGradient>
    <radialGradient id="blobA" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#8b5cf6" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blobB" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#3b82f6" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="markGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#c4b5fd"/>
      <stop offset="55%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#93c5fd"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="220" cy="120" rx="500" ry="320" fill="url(#blobA)"/>
  <ellipse cx="1000" cy="540" rx="520" ry="320" fill="url(#blobB)"/>

  <!-- Faint grid lines -->
  <g stroke="rgba(167,139,250,0.06)" stroke-width="1">
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
  </g>

  <!-- Brand mark: water drop on a gradient tile -->
  <g transform="translate(112, 220)">
    <rect width="160" height="160" rx="34" fill="url(#markGrad)"/>
    <path d="M80 30 C 60 60, 38 96, 38 122 A 42 42 0 1 0 122 122 C 122 96, 100 60, 80 30 Z" fill="#fff"/>
    <path d="M58 86 C 53 102, 51 116, 54 130" stroke="rgba(124,58,237,0.55)" stroke-width="6" stroke-linecap="round" fill="none"/>
  </g>

  <!-- Wordmark + tagline -->
  <g transform="translate(312, 282)">
    <text x="0" y="0"
          fill="url(#textGrad)"
          font-family="'Space Grotesk', 'Inter', system-ui, sans-serif"
          font-weight="600"
          font-size="124"
          letter-spacing="-3">ioclean<tspan fill="#a78bfa">.</tspan></text>
    <text x="6" y="64"
          fill="#a097c8"
          font-family="'Inter', system-ui, sans-serif"
          font-weight="400"
          font-size="32"
          letter-spacing="-0.5">Melbourne's premium commercial cleaning partner</text>
  </g>

  <!-- Bottom-right URL -->
  <text x="1136" y="588"
        text-anchor="end"
        fill="rgba(196, 181, 253, 0.7)"
        font-family="'JetBrains Mono', ui-monospace, monospace"
        font-size="20"
        letter-spacing="2">ioclean.com.au</text>
</svg>
