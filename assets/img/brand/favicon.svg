<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#a78bfa"/>
      <stop offset="55%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <radialGradient id="drop" cx="35%" cy="32%" r="65%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="55%"  stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </radialGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Outer ripple ring -->
  <circle cx="32" cy="32" r="25" stroke="rgba(255,255,255,0.3)"  stroke-width="1.5" fill="none"/>
  <!-- Inner ripple ring -->
  <circle cx="32" cy="32" r="18" stroke="rgba(255,255,255,0.6)"  stroke-width="1.5" fill="none"/>
  <!-- Central drop (gradient sphere) -->
  <circle cx="32" cy="32" r="11" fill="url(#drop)"/>
  <!-- Satellite -->
  <circle cx="55" cy="32" r="2"  fill="rgba(255,255,255,0.85)"/>
</svg>
